<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Film-Neuheiten</title>
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --surface2: #252525;
      --border: #2e2e2e;
      --accent: #e50914;
      --accent2: #ff6b35;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      flex: 1;
      min-width: 160px;
    }

    header h1 span {
      color: var(--accent);
    }

    #updated {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    #search {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 7px 12px;
      width: 220px;
      outline: none;
      transition: border-color 0.15s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }

    #filters {
      padding: 14px 20px 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }

    .filter-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 5px 13px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    #stats {
      padding: 10px 20px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      padding: 14px 20px 40px;
    }

    @media (min-width: 640px) {
      #grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 6px 24px rgba(229,9,20,0.18);
    }

    .card-img {
      aspect-ratio: 2/3;
      background: var(--surface2);
      overflow: hidden;
      position: relative;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.2s;
    }
    .card-img img.loading { opacity: 0; }
    .card-img img.loaded { opacity: 1; }

    .no-img {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: var(--border);
    }

    .card-body {
      padding: 10px 10px 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-title {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-source {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: auto;
    }

    .source-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    #empty {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    #loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>🎬 Film-<span>Neuheiten</span></h1>
  <span id="updated">Wird geladen…</span>
  <input id="search" type="search" placeholder="Suchen…" autocomplete="off">
</header>

<div id="filters"></div>
<div id="stats"></div>

<div id="loading">
  <div class="spinner"></div><br>Lade Daten…
</div>

<div id="grid"></div>
<div id="empty">Keine Treffer gefunden.</div>

<script>
const SOURCE_COLORS = {
  leonine:  "#e50914",
  capelight:"#0078d7",
  eykmedia: "#ff6b35",
  plaion:   "#7c3aed",
};

function sourceColor(id) {
  for (const [key, color] of Object.entries(SOURCE_COLORS)) {
    if (id.startsWith(key)) return color;
  }
  return "#888";
}

let allProducts = [];
let activeFilter = "all";
let searchQuery = "";

async function loadData() {
  const resp = await fetch("data.json?_=" + Date.now());
  const data = await resp.json();
  document.getElementById("loading").style.display = "none";

  if (data.updated) {
    const d = new Date(data.updated);
    document.getElementById("updated").textContent =
      "Stand: " + d.toLocaleDateString("de-DE") + " " +
      d.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
  }

  allProducts = data.products || [];
  buildFilters();
  render();
}

function buildFilters() {
  const sources = {};
  for (const p of allProducts) {
    if (!sources[p.source_id]) sources[p.source_id] = { label: p.source_label, count: 0 };
    sources[p.source_id].count++;
  }

  const container = document.getElementById("filters");
  container.innerHTML = "";

  const all = document.createElement("button");
  all.className = "filter-btn active";
  all.dataset.filter = "all";
  all.textContent = `Alle (${allProducts.length})`;
  all.onclick = () => setFilter("all");
  container.appendChild(all);

  for (const [id, { label, count }] of Object.entries(sources)) {
    const btn = document.createElement("button");
    btn.className = "filter-btn";
    btn.dataset.filter = id;
    const dot = `<span class="source-dot" style="background:${sourceColor(id)}"></span>`;
    btn.innerHTML = dot + label.replace("– ", "") + ` (${count})`;
    btn.onclick = () => setFilter(id);
    container.appendChild(btn);
  }
}

function setFilter(id) {
  activeFilter = id;
  document.querySelectorAll(".filter-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.filter === id);
  });
  render();
}

function render() {
  const q = searchQuery.toLowerCase();
  const filtered = allProducts.filter(p => {
    const matchFilter = activeFilter === "all" || p.source_id === activeFilter;
    const matchSearch = !q || p.title.toLowerCase().includes(q) || p.source_label.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });

  document.getElementById("stats").textContent =
    filtered.length + " von " + allProducts.length + " Titeln";

  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  document.getElementById("empty").style.display = filtered.length ? "none" : "block";

  for (const p of filtered) {
    const a = document.createElement("a");
    a.className = "card";
    a.href = p.url;
    a.target = "_blank";
    a.rel = "noopener";

    let imgHtml;
    if (p.image) {
      imgHtml = `<div class="card-img">
        <img class="loading" src="${p.image}" alt="" loading="lazy"
          onload="this.classList.replace('loading','loaded')"
          onerror="this.parentElement.innerHTML='<div class=\\'no-img\\'>🎬</div>'">
      </div>`;
    } else {
      imgHtml = `<div class="card-img"><div class="no-img">🎬</div></div>`;
    }

    const color = sourceColor(p.source_id);
    a.innerHTML = imgHtml + `
      <div class="card-body">
        <div class="card-title">${p.title}</div>
        <div class="card-source">
          <span class="source-dot" style="background:${color}"></span>${p.source_label}
        </div>
      </div>`;

    grid.appendChild(a);
  }
}

document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value;
  render();
});

loadData().catch(() => {
  document.getElementById("loading").innerHTML =
    "⚠️ Fehler beim Laden. Bitte Seite neu laden.";
});
</script>
</body>
</html>
